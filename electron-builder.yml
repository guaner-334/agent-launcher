appId: com.agent-launcher.app
productName: Agent启动器
directories:
  output: release
files:
  - dist-electron
  - dist
  - package.json
extraResources:
  - from: data
    to: data
    filter:
      - "**/*"
      - "!instances.json"
      - "!claude-configs/**"
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: null
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Agent启动器
asar: true
